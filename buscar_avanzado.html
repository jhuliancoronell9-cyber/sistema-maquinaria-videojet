
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Búsqueda Avanzada</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Videojet</a>
    <div>
      <a class="btn btn-light" href="catalogo.html">Catálogo</a>
      <a class="btn btn-light" href="buscar_serie.html">Buscar Serie</a>
      <a class="btn btn-light" href="buscar_avanzado.html">Búsqueda Avanzada</a>
    </div>
  </div>
</nav>

<div class="container">
  <h2>Búsqueda Avanzada</h2>

  <div class="row">
    <div class="col-md-4">
      <label>Tipo:</label>
      <select id="tipo" class="form-select">
        <option value="">Todos</option>
        <option value="cij">CIJ</option>
        <option value="láser">Láser</option>
        <option value="tij">TIJ</option>
      </select>
    </div>

    <div class="col-md-4">
      <label>Tecnología:</label>
      <input id="tecnologia" type="text" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Material:</label>
      <input id="material" type="text" class="form-control">
    </div>
  </div>

  <button class="btn btn-primary w-100 mt-3" onclick="buscarAvanzado()">Buscar</button>

  <div id="resultadosAvanzados" class="mt-4"></div>
</div>

<script src="./js/app.js"></script>
