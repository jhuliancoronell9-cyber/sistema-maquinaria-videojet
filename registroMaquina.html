<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registrar Máquina</title>
<link rel="stylesheet" href="./css/styles.css">
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container seccion">
  <h2 class="text-center mb-4">Registrar Nueva Máquina</h2>

  <div class="row justify-content-center mb-5">
    <div class="col-md-6">

      <!-- Panel de registro -->
      <div class="card shadow p-4">
        <h4 class="mb-3">Información de la máquina</h4>

        <form id="formMaquina">
          <input class="form-control mb-3" type="text" id="id" placeholder="ID" required>
          <input class="form-control mb-3" type="text" id="nombre" placeholder="Nombre" required>
          <input class="form-control mb-3" type="text" id="serie" placeholder="Serie" required>
          <input class="form-control mb-3" type="text" id="tipo" placeholder="Tipo" required>
          <input class="form-control mb-3" type="text" id="estado" placeholder="Estado" required>

          <button class="btn btn-success w-100" type="submit">Guardar Máquina</button>
        </form>

        <button class="btn btn-secondary w-100 mt-3" onclick="window.location.href='catalogo.html'">
          Volver al Catálogo
        </button>
      </div>
    </div>
  </div>

  <!-- Lista de máquinas registradas -->
  <div class="row">
    <h4 class="mb-3">Máquinas Registradas</h4>
    <div id="listaRegistradas" class="d-flex overflow-auto flex-row gap-3 pb-3">
      <!-- Aquí se agregan los items por JS -->
    </div>
  </div>
</div>

<footer>
  © 2025 Videojet - Registro de maquinaria
</footer>

<script src="./js/registro.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // =======================
  // Mostrar lista de máquinas registradas
  // =======================
  function renderListaRegistradas() {
    const lista = JSON.parse(localStorage.getItem("maquinas")) || [];
    const cont = document.getElementById("listaRegistradas");
    cont.innerHTML = "";

    lista.forEach(m => {
      const card = document.createElement("div");
      card.className = "card p-2 shadow-sm d-flex flex-row align-items-center registro-item";

      card.innerHTML = `
        <img src="imagenes/registro.png" class="rounded-circle registro-img me-3" alt="${m.nombre}">
        <div>
          <h6 class="mb-1">${m.nombre}</h6>
          <small>Código: ${m.serie} | Tipo: ${m.tipo}</small>
        </div>
      `;
      cont.appendChild(card);
    });
  }

  // Ejecutar al cargar
  document.addEventListener("DOMContentLoaded", () => renderListaRegistradas());

  // También actualizar lista después de agregar
  document.getElementById("formMaquina").addEventListener("submit", function(e) {
    e.preventDefault();
    let maquina = {
      id: document.getElementById("id").value,
      nombre: document.getElementById("nombre").value,
      serie: document.getElementById("serie").value,
      tipo: document.getElementById("tipo").value,
      estado: document.getElementById("estado").value
    };
    let lista = JSON.parse(localStorage.getItem("maquinas")) || [];
    lista.push(maquina);
    localStorage.setItem("maquinas", JSON.stringify(lista));

    alert("Máquina registrada");
    this.reset(); // limpiar formulario
    renderListaRegistradas(); // actualizar lista
  });
</script>

</body>
</html>
