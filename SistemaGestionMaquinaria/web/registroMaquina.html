<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registrar Máquina</title>
<link rel="stylesheet" href="./css/styles.css">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container">
<h2>Registrar Máquina</h2>

<form id="formMaquina">

<input class="form-control mb-2" type="text" id="id" placeholder="ID">
<input class="form-control mb-2" type="text" id="nombre" placeholder="Nombre">
<input class="form-control mb-2" type="text" id="serie" placeholder="Serie">
<input class="form-control mb-2" type="text" id="tipo" placeholder="Tipo">
<input class="form-control mb-2" type="text" id="estado" placeholder="Estado">

<button class="btn btn-success" type="submit">
Guardar
</button>

</form>
</div>

<script src="./js/registro.js"></script>

</body>
</html>
